<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Assistant AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
    }

    .header {
      background: linear-gradient(135deg, #1a365d, #2b6cb0);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .body { padding: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      color: #2d3748;
    }
    textarea { resize: vertical; min-height: 80px; font-size: 11px; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #2b6cb0, #1a365d);
      color: white;
    }
    .btn-secondary {
      background: #edf2f7;
      color: #2d3748;
      margin-top: 6px;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .status.info    { background: #ebf8ff; color: #2b6cb0; display: block; }
    .status.success { background: #f0fff4; color: #276749; display: block; }
    .status.error   { background: #fff5f5; color: #c53030; display: block; }
    .status.loading { background: #fffbeb; color: #744210; display: block; }

    .download-links { margin-top: 10px; }
    .download-links a {
      display: block;
      background: white;
      border: 1px solid #bee3f8;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #2b6cb0;
      text-decoration: none;
      font-weight: 600;
    }
    .download-links a:hover { background: #ebf8ff; }

    .score-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      background: #c6f6d5;
      color: #276749;
    }

    .footer {
      padding: 10px 16px;
      background: #edf2f7;
      font-size: 10px;
      color: #a0aec0;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🚀 Job Assistant AI</h1>
    <p>Generate ATS resume from this job</p>
  </div>
</div>

<div class="body">
  <label>Your API Server URL</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:8000" value="http://localhost:8000"/>

  <label>Your User ID (from uploaded resume)</label>
  <input type="text" id="userId" placeholder="Paste user_id from the web app"/>

  <label>Job Title (auto-detected)</label>
  <input type="text" id="jobTitle" placeholder="Detecting..." readonly/>

  <label>Company (auto-detected)</label>
  <input type="text" id="company" placeholder="Detecting..." readonly/>

  <label>Job Description (preview)</label>
  <textarea id="jdPreview" placeholder="Extracting JD..." readonly></textarea>

  <button class="btn btn-primary" id="generateBtn" disabled>
    ⚡ Generate ATS Resume
  </button>
  <button class="btn btn-secondary" id="detectBtn">
    🔍 Re-detect Job Details
  </button>

  <div class="status" id="status"></div>
  <div class="download-links" id="downloads" style="display:none"></div>
</div>

<div class="footer">Job Assistant AI · Powered by Claude</div>

<script src="popup.js"></script>
</body>
</html>
