version: "3.9"

services:
  # ── PostgreSQL (optional – default is SQLite) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: job_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/job_assistant
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OUTPUT_DIR: /app/outputs
      ENVIRONMENT: development
    volumes:
      - .:/app
      - outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy

  # ── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  pgdata:
  outputs:
